name: Tipos de triggers (step 5)
run-name: ¡Aprendiendo diferentes tipos de triggers!
on: 
  push:
    branches:
      - main
      - aprendiendo-github-actions
  pull_request:
    types: [opened, synchronize, reopened] ## synchronize = cuando ocurre un push a una rama con una PR abierta
    paths: ## archivos que deben haber cambiado
      - '**.ts'   
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      lenguaje_favorito:
        description: 'Lenguaje favorito'
        default: JavaScript
        required: true
        type: choice
        options:
          - Python
          - JavaScript
          - Go
      nombre:
        description: 'Mi nombre'
        required: true
        default: Edwin
        type: string

  schedule:
    - cron: "30 5,17 * * *" ## se ejecuta a las 5:30 A.M. y P.M. durante todo el año
      timezone: 'America/El_Salvador'

jobs:
  hola-mundo-manual:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Instalar Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22

      - name: Instalar Typescript y tipos de Node
        run: npm install --save-dev typescript @types/node

      - name: Definir nombre
        run: echo "USERNAME=${{ inputs.nombre }}" >> $GITHUB_ENV

      - name: Definir lenguaje
        run: echo "LANGUAGE=${{ inputs.lenguaje_favorito }}" >> $GITHUB_ENV

      - name: Compilar typescript
        run: tsc

      - name: Correr script
        run: node dist/lenguaje-favorito.js
  hola-mundo:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
